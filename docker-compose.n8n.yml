version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-ibiza-beyond
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - .env.n8n
    environment:
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows

volumes:
  n8n_data:
    driver: local
