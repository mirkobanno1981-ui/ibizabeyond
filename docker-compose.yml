services:
  app:
    build: .
    container_name: ibiza-beyond-prod
    ports:
      - "8085:80"
    restart: always

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    restart: always
