_format_version: "1.1"

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: true
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true

upstreams:
  - name: auth
    targets:
      - target: auth:9999
  - name: rest
    targets:
      - target: rest:3000
